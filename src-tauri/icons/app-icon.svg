  <!-- Bottom text -->
  <text x="512" y="740" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="rgba(255,255,255,0.5)" letter-spacing="8">FORGE</text>
