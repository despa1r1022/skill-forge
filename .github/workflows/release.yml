name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete proxy
          npm config delete https-proxy
          npm install --no-optional

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SkillForge ${{ github.ref_name }}'
          releaseBody: |
            ## 下载安装

            | 平台 | 安装包 | 说明 |
            |------|--------|------|
            | **macOS** | `SkillForge_*_x64.dmg` | 双击安装，如提示不安全请到「系统设置 → 隐私与安全性」允许 |
            | **Windows** | `SkillForge_*_x64.msi` | 双击安装，建议选 `.msi` |
            | **Linux** | `SkillForge_*_amd64.deb` | Debian/Ubuntu: `sudo dpkg -i *.deb` |
            | **Linux** | `SkillForge_*_amd64.AppImage` | 通用: `chmod +x *.AppImage && ./*.AppImage` |

            ## 更新内容
            请查看 [CHANGELOG.md](./CHANGELOG.md)

            ## 校验
            所有安装包均通过 GitHub Actions 自动构建，源码可见 Actions 日志。
          releaseDraft: false
          prerelease: false
