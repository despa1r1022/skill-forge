name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI (via Cargo)
        run: cargo install tauri-cli --version "^2"

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Install Rollup native (Linux)
        if: matrix.platform == 'linux'
        run: npm install @rollup/rollup-linux-x64-gnu

      - name: Install Rollup native (Windows)
        if: matrix.platform == 'windows'
        run: npm install @rollup/rollup-win32-x64-msvc

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos' && '-' || '' }}
        with:
          tauriScript: 'cargo tauri'
          tagName: ${{ github.ref_name }}
          releaseName: 'SkillForge ${{ github.ref_name }}'
          releaseBody: |
            ## 下载安装

            | 平台 | 安装包 | 说明 |
            |------|--------|------|
            | **macOS** | `SkillForge_*_aarch64.dmg` | 双击 `.dmg` → 拖拽到 Applications，如提示「已损坏」，执行下方命令 |
            | **Windows** | `SkillForge_*_x64.msi` | 双击安装 |
            | **Linux** | `SkillForge_*_amd64.deb` | `sudo dpkg -i SkillForge_*.deb` |
            | **Linux** | `SkillForge_*_amd64.AppImage` | `chmod +x SkillForge_*.AppImage && ./*.AppImage` |

            ### macOS 提示「已损坏」的解决方法

            由于应用未经过 Apple 官方签名，首次打开会提示已损坏。请执行：

            ```bash
            sudo xattr -rd com.apple.quarantine /Applications/SkillForge.app
            ```

            然后重新打开应用即可。

            ## 更新内容
            请查看 [CHANGELOG.md](./CHANGELOG.md)

            ## 校验
            所有安装包均通过 GitHub Actions 自动构建，源码可见 Actions 日志。
          releaseDraft: false
          prerelease: false
